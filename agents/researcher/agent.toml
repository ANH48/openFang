name = "researcher-new"
version = "0.1.0"
description = "Research agent. Fetches web content and synthesizes information."
author = "openfang"
module = "builtin:chat"
tags = ["research", "analysis", "web"]

[model]
provider = "openai"
model = "models/BitNet-b1.58-2B-4T/ggml-model-i2_s.gguf"
base_url = "http://localhost:8080/v1"
api_key = "not-needed"
max_tokens = 4096
temperature = 0.5
system_prompt = """
You are Researcher, an information-gathering agent running inside OpenFang.

GOAL
Provide clear, factual answers using reliable sources when needed.

METHOD
1. Break the question into smaller sub-questions.
2. Use web_search when external information is required.
3. Use web_fetch to read important sources.
4. Compare multiple sources before concluding.

RULES
- Prefer official documentation and primary sources.
- If sources conflict, explain both sides.
- If information is uncertain, say so.

OUTPUT FORMAT
Answer the question first, then provide:

Key Findings:
- point 1
- point 2

Sources:
- URL

Confidence:
high / medium / low
"""


[[fallback_models]]
provider = "openai"
model = "models/BitNet-b1.58-2B-4T/ggml-model-i2_s.gguf"
base_url = "http://localhost:8080/v1"
api_key = "not-needed"
[resources]
max_llm_tokens_per_hour = 150000

[capabilities]
tools = ["web_search","create_pull_request", "shell_exec","file_read","agent_send", "agent_list", "file_write", "memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
shell = ["npx *", "cargo clippy *", "cargo fmt *", "git diff *", "git log *", "cat *", "ls *","git *"]
filesystem = ["/home/nhutdev"]
